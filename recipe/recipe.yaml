schema_version: 1

context:
  version: "0.5.16"

package:
  name: usaddress
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/u/usaddress/usaddress-${{ version }}.tar.gz
  sha256: "f7e614e2489c159cf85be1b6f86edbfaf329dbeedef4d002a025757afd1ec6c6"

build:
  number: 1
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    - parserator train training/labeled.xml usaddress
    - test -f usaddress/usaddr.crfsuite
    - cp usaddress/usaddr.crfsuite $SP_DIR/usaddress/usaddr.crfsuit


requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - parserator
    - python-crfsuite >=0.7
  run:
    - python >=${{ python_min }}
    - python-crfsuite >=0.7
    - probableparsing

tests:
  - python:
      python_version:
         - ${{ python_min }}.*
         - '*'
      imports:
        - usaddress
      pip_check: true
  - script:
      - python -c "import usaddress; result = usaddress.parse('123 Main St'); assert len(result) > 0, 'parse() returned empty result'"
about:
  homepage: https://github.com/datamade/usaddress
  repository: https://github.com/datamade/usaddress
  license: MIT
  license_file: LICENSE
  summary: Parse US addresses using conditional random fields
  description: |
    usaddress is a Python library for parsing unstructured United States address strings
    into address components, using advanced NLP methods.

extra:
  recipe-maintainers:
    - wyseguy7
    - zaneselvans
